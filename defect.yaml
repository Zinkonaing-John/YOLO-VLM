# YOLO Dataset Configuration for NEU Steel Surface Defect Detection
# ------------------------------------------------------------------
# Trained on NEU-DET: NEU Surface Defect Database
# 6 classes of metal surface defects
#
# Expected directory structure:
#   path/
#     train/
#       images/
#       labels/
#     val/
#       images/
#       labels/
#
# Label format: YOLO (class_id cx cy w h) normalised to [0, 1].

path: datasets/NEU-DET
train: train/images
val: val/images

# Number of classes
nc: 6

# Class names (matches NEU-DET training)
names:
  0: crazing
  1: inclusion
  2: patches
  3: pitted_surface
  4: rolled-in_scale
  5: scratches
